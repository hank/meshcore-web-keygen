server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Ensure correct MIME type for WebAssembly
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }

    # Always revalidate so deploys propagate without a stale cache.
    # Browsers still cache locally but check ETag/Last-Modified each load (cheap 304s).
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|svg|ico|woff2?|html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
}
